name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install

      - name: Gate
        run: |
          pnpm typecheck
          pnpm test
          pnpm lint
          pnpm format:check
          pnpm knip
          pnpm build
          pnpm audit:architecture
          pnpm deno:smoke

      - name: Build release binaries
        # TODO: macOS binaries are not code-signed or notarized. Gatekeeper will
        # block them on first run until the user approves in System Settings.
        # Fix: obtain an Apple Developer account, sign with codesign --sign
        # "Developer ID Application: ...", notarize with notarytool, and staple
        # the ticket. Until then, document xattr -dr com.apple.quarantine <binary>
        # as the workaround for direct downloads.
        run: pnpm deno:build-binaries

      - name: Prepare npm wrapper
        run: deno run --allow-read --allow-write scripts/prepare-npm.ts "${{ github.ref_name }}"

      - name: Verify wrapper version matches tag
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PKG_VERSION="$(node -e "console.log(require('./npm/package.json').version)")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Version mismatch: tag=${TAG_VERSION}, npm/package.json=${PKG_VERSION}"
            exit 1
          fi

      - name: Debug OIDC token claims
        run: |
          TOKEN=$(curl -fsSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" | jq -r '.value')
          echo "=== OIDC token payload ==="
          echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq .

      - name: npm publish
        working-directory: npm
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/phax-darwin-arm64
            dist/release/phax-darwin-arm64.sha256
            dist/release/phax-darwin-x64
            dist/release/phax-darwin-x64.sha256
            dist/release/phax-linux-x64
            dist/release/phax-linux-x64.sha256
            dist/release/phax-linux-arm64
            dist/release/phax-linux-arm64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
