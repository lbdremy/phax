name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Upgrade npm to support stage publish
        run: npm install -g npm@11.16.0

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install

      - name: Install usage CLI
        env:
          USAGE_VERSION: v3.5.2
        run: |
          curl -fsSL "https://github.com/jdx/usage/releases/download/${USAGE_VERSION}/usage-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin usage
          usage --version

      - name: Gate
        run: |
          pnpm typecheck
          pnpm test
          pnpm lint
          pnpm format:check
          pnpm knip
          pnpm build
          pnpm audit:architecture
          pnpm deno:smoke

      - name: Build release binaries
        # TODO: macOS binaries are not code-signed or notarized. Gatekeeper will
        # block them on first run until the user approves in System Settings.
        # Fix: obtain an Apple Developer account, sign with codesign --sign
        # "Developer ID Application: ...", notarize with notarytool, and staple
        # the ticket. Until then, document xattr -dr com.apple.quarantine <binary>
        # as the workaround for direct downloads.
        run: pnpm deno:build-binaries

      - name: Prepare npm wrapper
        run: deno run --allow-read --allow-write scripts/prepare-npm.ts "${{ github.ref_name }}"

      - name: Verify wrapper version matches tag
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PKG_VERSION="$(node -e "console.log(require('./npm/package.json').version)")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Version mismatch: tag=${TAG_VERSION}, npm/package.json=${PKG_VERSION}"
            exit 1
          fi

      - name: npm stage publish
        working-directory: npm
        run: npm stage publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/release/phax-darwin-arm64
            dist/release/phax-darwin-arm64.sha256
            dist/release/phax-darwin-x64
            dist/release/phax-darwin-x64.sha256
            dist/release/phax-linux-x64
            dist/release/phax-linux-x64.sha256
            dist/release/phax-linux-arm64
            dist/release/phax-linux-arm64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
