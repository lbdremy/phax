name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "pnpm"

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install

      - name: Install usage CLI
        env:
          USAGE_VERSION: v3.5.2
        run: |
          curl -fsSL "https://github.com/jdx/usage/releases/download/${USAGE_VERSION}/usage-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin usage
          usage --version

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Knip
        run: pnpm knip

      - name: Build
        run: pnpm build

      - name: Architecture audit
        run: pnpm audit:architecture

      - name: Deno smoke
        run: pnpm deno:smoke

      - name: Deno compile (host binary)
        run: pnpm deno:compile
