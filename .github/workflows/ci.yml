name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install

      - name: Install usage CLI
        env:
          USAGE_VERSION: v3.5.2
        run: |
          curl -fsSL "https://github.com/jdx/usage/releases/download/${USAGE_VERSION}/usage-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin usage
          usage --version

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Knip
        run: pnpm knip

      - name: Build
        run: pnpm build

      - name: Architecture audit
        run: pnpm audit:architecture

      - name: Deno smoke
        run: pnpm deno:smoke

      - name: Deno compile (host binary)
        run: pnpm deno:compile

  # Report-only security audit. Does not gate CI yet (FAIL_ON=none +
  # continue-on-error); the report is uploaded as an artifact for review. Flip
  # to blocking (drop the env override and continue-on-error) once the tree is
  # clean — see docs/security.md "Keeping security high".
  security-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Security audit (report-only)
        run: pnpm audit:security
        env:
          FAIL_ON: none
        continue-on-error: true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: dist/security-audit/
          if-no-files-found: warn
